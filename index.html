<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Inspector</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
            border: 1px solid var(--border-color);
        }

        header { text-align: center; margin-bottom: 24px; }
        header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
        header p { color: var(--text-muted); font-size: 14px; }

        #drop-zone {
            border: 2px dashed var(--border-color);
            padding: 40px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.01);
        }

        #drop-zone:hover, #drop-zone.hover {
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.04);
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .upload-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .upload-subtext { color: var(--text-muted); font-size: 12px; }

        #results {
            display: none;
            margin-top: 24px;
            animation: fadeIn 0.3s ease-out;
        }

        .preview-container {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: #0b0f19;
        }

        #image-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.pass { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge.fail { background: rgba(239, 68, 68, 0.15); color: var(--error); }

        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .data-row:last-child { border-bottom: none; padding-bottom: 0; }

        .data-label { color: var(--text-muted); font-size: 14px; }
        .data-value { font-size: 14px; font-weight: 600; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Photo Inspector</h1>
            <p>Verify resolutions and requirements instantly</p>
        </header>

        <div id="drop-zone">
            <span class="upload-icon">📷</span>
            <div class="upload-text">Drag & drop your image</div>
            <div class="upload-subtext">or click to browse local files</div>
        </div>
        
        <input type="file" id="file-input" accept="image/*" style="display: none;">

        <div id="results">
            <div class="preview-container">
                <img id="image-preview" src="" alt="Preview">
            </div>

            <div id="status-badge" class="badge"></div>

            <div class="data-grid">
                <div class="data-row">
                    <span class="data-label">Dimensions</span>
                    <span class="data-value" id="dimensions">-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Aspect Ratio</span>
                    <span class="data-value" id="ratio">-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Target Criteria</span>
                    <span class="data-value" style="color: var(--text-muted);">Min. 1200 × 800px</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const results = document.getElementById('results');
        const imgPreview = document.getElementById('image-preview');

        const MIN_WIDTH = 1200;
        const MIN_HEIGHT = 800;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return alert('Please upload an image file.');

            const reader = new FileReader();
            reader.onload = function(event) {
                imgPreview.src = event.target.result;
                
                const img = new Image();
                img.onload = function() {
                    analyzeImage(img.width, img.height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function analyzeImage(width, height) {
            const gcd = (a, b) => b ? gcd(b, a % b) : a;
            const divisor = gcd(width, height);
            const aspectWritable = `${width / divisor}:${height / divisor}`;

            const isPassing = width >= MIN_WIDTH && height >= MIN_HEIGHT;

            document.getElementById('dimensions').innerText = `${width} × ${height} px`;
            document.getElementById('ratio').innerText = aspectWritable;
            
            const badge = document.getElementById('status-badge');
            if (isPassing) {
                badge.innerText = "✓ Passed Requirements";
                badge.className = "badge pass";
            } else {
                badge.innerText = "✕ Failed Requirements";
                badge.className = "badge fail";
            }

            results.style.display = 'block';
        }
    </script>
</body>
</html>
