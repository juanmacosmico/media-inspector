<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Day Films - Asset Inspector</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --card-bg: #141b2f;
            --input-bg: #0d1326;
            --accent-orange: #f97316; /* New Day Signature Tone */
            --accent-blue: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --color-success: #10b981;
            --color-error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
        }

        header { text-align: center; margin-bottom: 28px; }
        
        /* Brand Identity Integration */
        .brand-logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .sun-vector {
            width: 32px;
            height: 32px;
            fill: var(--accent-orange);
            filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.4));
        }

        header h1 { 
            font-size: 22px; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            margin-bottom: 4px; 
        }
        
        header p { color: var(--text-secondary); font-size: 13px; }

        .field-group { margin-bottom: 20px; }
        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .custom-select {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .custom-select:focus {
            border-color: var(--accent-orange);
        }

        #drop-zone {
            border: 2px dashed var(--border-color);
            padding: 35px 20px;
            border-radius: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }
        #drop-zone.drag-over { 
            border-color: var(--accent-orange); 
            background: rgba(249, 115, 22, 0.03); 
        }

        .main-upload-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .sub-upload-text { color: var(--text-secondary); font-size: 12px; margin-bottom: 12px; }

        .browse-btn {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .browse-btn:hover { background-color: #ea580c; }

        #results-viewport { display: none; margin-top: 28px; }

        .media-preview-window {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: #060911;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #img-render { width: 100%; height: 100%; object-fit: contain; }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status-pill.pass { background: rgba(16, 185, 129, 0.12); color: var(--color-success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-pill.fail { background: rgba(239, 68, 68, 0.12); color: var(--color-error); border: 1px solid rgba(239, 68, 68, 0.2); }

        .meta-stack { display: flex; flex-direction: column; gap: 14px; }
        .meta-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .meta-item:last-child { border-bottom: none; padding-bottom: 0; }
        .meta-label { color: var(--text-secondary); font-size: 13px; }
        .meta-val { font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand-logo-area">
                <!-- Custom Inline Scalable Sun Vector Icon representing New Day Films -->
                <svg class="sun-vector" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>New Day Films</h1>
            <p>Filmmaker Delivery Blueprint Verification</p>
        </header>

        <div class="field-group">
            <label class="field-label" for="criteria-select">Required Asset Category</label>
            <select id="criteria-select" class="custom-select">
                <option value="primary_poster">Primary Poster (1548 × 2193)</option>
                <option value="horizontal_poster">Horizontal Poster (16:9)</option>
                <option value="filmmaker_photo">Filmmaker Photo (1548 × 2193)</option>
                <option value="production_stills">Production Stills (High-Res, 300DPI)</option>
                <option value="bts_photos">Behind the Scenes Photos (16:9)</option>
                <option value="film_thumbnail">Film Thumbnail (1920 × 1080, &lt; 2MB)</option>
            </select>
        </div>

        <div id="drop-zone">
            <div class="main-upload-text">Drag & Drop Image Asset Here</div>
            <div class="sub-upload-text">or choose from local storage</div>
            <button class="browse-btn" id="trigger-btn">Select Asset</button>
        </div>
        
        <input type="file" id="secure-file-input" style="display: none;" accept="image/*">

        <div id="results-viewport">
            <div class="media-preview-window">
                <img id="img-render" src="" alt="Preview">
            </div>

            <div id="evaluation-pill" class="status-pill"></div>

            <div class="meta-stack">
                <div class="meta-item"><span class="meta-label">File Context</span><span class="meta-val" id="val-filename">-</span></div>
                <div class="meta-item"><span class="meta-label">Storage Footprint</span><span class="meta-val" id="val-filesize">-</span></div>
                <div class="meta-item"><span class="meta-label">Pixel Map</span><span class="meta-val" id="val-dimensions">-</span></div>
                <div class="meta-item"><span class="meta-label">Aspect Structure</span><span class="meta-val" id="val-ratio">-</span></div>
                <div class="meta-item"><span class="meta-label">Target Standard</span><span class="meta-val" id="val-requirement" style="color: var(--text-secondary);">-</span></div>
            </div>
        </div>
    </div>

    <script>
        // High-level absolute override to prevent native file dropping loops over live HTTPS environments
        window.addEventListener('dragover', e => e.preventDefault(), false);
        window.addEventListener('drop', e => e.preventDefault(), false);

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('secure-file-input');
        const triggerBtn = document.getElementById('trigger-btn');
        const criteriaSelect = document.getElementById('criteria-select');
        const resultsViewport = document.getElementById('results-viewport');
        const imgRender = document.getElementById('img-render');

        const pipelineRules = {
            primary_poster: { exactW: 1548, exactH: 2193 },
            horizontal_poster: { ratioW: 16, ratioH: 9 },
            filmmaker_photo: { exactW: 1548, exactH: 2193 },
            production_stills: { minW: 1920, note: "Keep uncropped / 300dpi / RGB" },
            bts_photos: { ratioW: 16, ratioH: 9, note: "16:9 or Film Ratio Match" },
            film_thumbnail: { exactW: 1920, exactH: 1080, maxBytes: 2000000 }
        };

        criteriaSelect.addEventListener('change', () => {
            fileInput.value = "";
            resultsViewport.style.display = 'none';
        });

        triggerBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
        fileInput.addEventListener('change', e => { if (e.target.files.length) processFile(e.target.files); });

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
